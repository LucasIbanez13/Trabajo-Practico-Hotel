<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Reservas</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <h1 class="header__title">Panel de Reservas</h1>
        <button class="btn-nueva-reserva" id="btn-nueva-reserva">+ Nueva Reserva</button>
    </header>
    <main class="main">
        <section class="form-section" id="form-section"></section>
        <section class="panel" id="panel">
            <div class="table-container">
                <table class="reservas-table">
                    <thead class="reservas-table__head">
                        <tr class="reservas-table__row reservas-table__row--header">
                            <th class="reservas-table__heading">Nombre</th>
                            <th class="reservas-table__heading">Apellido</th>
                            <th class="reservas-table__heading">DNI</th>
                            <th class="reservas-table__heading">Teléfono</th>
                            <th class="reservas-table__heading">Email</th>
                            <th class="reservas-table__heading">Habitación</th>
                            <th class="reservas-table__heading">Ingreso</th>
                            <th class="reservas-table__heading">Salida</th>
                            <th class="reservas-table__heading">Cant. Personas</th>
                            <th class="reservas-table__heading">Estado</th>
                            <th class="reservas-table__heading">Acciones</th>
                        </tr>
                    </thead>
                    <tbody class="reservas-table__body" id="tabla-reservas"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Crear Reserva -->
    <div id="modal-crear-reserva" style="display:none;" class="modal-crear-overlay">
        <div class="modal-crear">
            <div class="modal-crear__header">
                <h2 class="modal-crear__title">Nueva Reserva</h2>
                <button id="btn-cerrar-modal" class="modal-crear__close">✕</button>
            </div>
            <form id="form-crear" class="modal-crear__form">
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Nombre</label>
                    <input id="nombre" class="modal-crear__input" placeholder="Juan" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Apellido</label>
                    <input id="apellido" class="modal-crear__input" placeholder="Pérez" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">DNI</label>
                    <input id="dni" class="modal-crear__input" placeholder="12345678" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Teléfono</label>
                    <input id="telefono" class="modal-crear__input" placeholder="3812345678" />
                </div>
                <div class="modal-crear__form-group modal-crear__form-group--full">
                    <label class="modal-crear__label">Email</label>
                    <input id="email" type="email" class="modal-crear__input" placeholder="juan@email.com" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Habitación</label>
                    <input id="habitacion" type="number" class="modal-crear__input" placeholder="101" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Cant. Personas</label>
                    <input id="cantPersonas" type="number" class="modal-crear__input" placeholder="2" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Fecha Ingreso</label>
                    <input id="fechaIngreso" type="datetime-local" class="modal-crear__input" />
                </div>
                <div class="modal-crear__form-group">
                    <label class="modal-crear__label">Fecha Salida</label>
                    <input id="fechaSalida" type="datetime-local" class="modal-crear__input" />
                </div>
                <div class="modal-crear__footer">
                    <button type="button" id="btn-cancelar" class="modal-crear__btn-cancelar">Cancelar</button>
                    <button type="submit" class="modal-crear__btn-guardar">Crear Reserva</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>

</html>
